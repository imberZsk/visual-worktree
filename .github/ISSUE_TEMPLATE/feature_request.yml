name: 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 这个建议想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 Visual Worktree 如何支持这个场景？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你目前是如何绕过这个问题的？
    validations:
      required: false
