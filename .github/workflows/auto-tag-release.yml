name: Auto Tag Release

# PR 合并到 main 后自动判断是否需要发布；只打 tag，不直接创建 Release。
# Release 仍交给 release.yml 统一处理，保证打包、上传、发布链路只有一个入口。
on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-tag-release
  cancel-in-progress: false

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout main with tags
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Decide release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          # pr_number 存储当前要分析的 Pull Request 编号。
          pr_number="${PR_NUMBER}"
          # pr_title 存储当前 Pull Request 标题，用于跳过显式 release PR。
          pr_title="${PR_TITLE}"
          # merge_sha 存储 PR 合并后 main 上对应的提交，用作 tag 目标。
          merge_sha="${MERGE_SHA}"

          # 手动 release PR 只负责版本号或发布元信息，不再触发二次自动打 tag。
          if [[ "$pr_title" =~ ^chore:\ release\ v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=release-pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # pr_json 存储 GitHub CLI 拉取到的 PR 元数据和变更文件清单。
          pr_json="$(mktemp)"
          gh pr view "$pr_number" --json files,labels,title > "$pr_json"

          # product_file_count 存储本次 PR 中属于产品代码或打包资源的文件数量。
          product_file_count="$(
            jq '[.files[].path | select(
              test("^(src|electron|build|scripts)/")
              or . == "package.json"
              or . == "pnpm-lock.yaml"
            )] | length' "$pr_json"
          )"

          if [ "$product_file_count" -eq 0 ]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=docs-or-non-product" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main --tags --force

          # rebase merge 等场景理论上也会提供 merge_commit_sha；这里保底校验，避免空 SHA 导致误打 tag。
          if [ -z "$merge_sha" ] || ! git cat-file -e "$merge_sha^{commit}" 2>/dev/null; then
            merge_sha="$(git rev-parse origin/main)"
          fi

          # existing_tag 存储 tag 目标提交上已有的版本 tag，避免重复发版。
          existing_tag="$(git tag --points-at "$merge_sha" --list 'v[0-9]*.[0-9]*.[0-9]*' | head -n 1 || true)"
          if [ -n "$existing_tag" ]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=already-tagged" >> "$GITHUB_OUTPUT"
            echo "existing_tag=$existing_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # pkg_version 存储 merge_sha 对应提交上 package.json 的 version 字段。
          # WHY 以 package.json 为唯一版本源：原先基于「上一个 tag 递增 patch」计算 tag，
          # 完全不参照 package.json，而 package.json 的 version 由开发者手动按语义化版本提升，
          # 两套口径从不互相校准，会越差越远（实测 v1.3.8 指向的代码 package.json 已是 1.5.0）。
          # 改为直接读 package.json，保证「package.json 版本 = git tag = GitHub Release」恒等。
          pkg_version="$(git show "${merge_sha}:package.json" | jq -r '.version')"
          if [ -z "$pkg_version" ] || [ "$pkg_version" = "null" ]; then
            echo "无法从 package.json 读取 version，终止发版" >&2
            exit 1
          fi

          # new_tag 存储即将创建并推送的新版本 tag，恒等于 package.json 版本。
          new_tag="v${pkg_version}"

          # 该版本已存在同名 tag：说明本次 PR 未提升 package.json 版本，无需重复发版。
          # WHY 跳过而非报错：日常改文档/CI/重构而不动版本号是正常的，不该阻断合并流程。
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=version-unchanged" >> "$GITHUB_OUTPUT"
            echo "existing_tag=$new_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release_needed=true" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "merge_sha=$merge_sha" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.release.outputs.release_needed == 'true'
        env:
          NEW_TAG: ${{ steps.release.outputs.new_tag }}
          MERGE_SHA: ${{ steps.release.outputs.merge_sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # new_tag 存储上一步计算出的待发布版本 tag。
          new_tag="${NEW_TAG}"
          # merge_sha 存储上一步确认的 tag 目标提交。
          merge_sha="${MERGE_SHA}"

          git tag -a "$new_tag" "$merge_sha" -m "$new_tag"
          git push origin "$new_tag"
