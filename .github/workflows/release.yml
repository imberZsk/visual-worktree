name: Release

# 仅在推送 v* 标签时触发正式发布（如 v1.2.3）。
# WHY 用 tag 而非普通 push：日常提交只跑 ci.yml 做测试与打包验证，不发布；
# 只有主动打 tag 才代表「就发这个版本」，避免每次 push 都误发一个 Release。
on:
  push:
    tags:
      - 'v*'

# 给内置 GITHUB_TOKEN 写权限：默认 token 只读，创建 Release / 上传附件需要 contents: write，否则 403。
permissions:
  contents: write

jobs:
  # 阶段一：各平台只原生打包，产物上传为 artifact，不创建 Release。
  # WHY 只打包不发布：若让两个平台 job 各自调 electron-builder --publish，二者并行时会同时检测到
  # 「Release 尚不存在」而各自创建，产生两个重复的 Release/草稿（已实测踩坑）。故发布统一交给下方单个 publish job。
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # 某一平台失败不取消另一平台，便于单独重跑
      fail-fast: false
      matrix:
        include:
          # Windows：nsis 安装包 + portable 便携版，x64
          - os: windows-latest
            build_args: --win --x64
          # macOS：DMG，arm64
          - os: macos-latest
            build_args: --mac --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI
        run: pnpm run build:ui

      # 只打包不发布（--publish never）：产物落到 release/ 目录，由 publish job 统一发布。
      # package.json 保留 build.publish 配置，使 electron-builder 仍生成 latest*.yml 自动更新元数据。
      - name: Package
        run: npx electron-builder ${{ matrix.build_args }} --publish never
        env:
          # 无签名证书时关闭自动发现，避免联网拖慢；产物未签名（mac 需右键打开 / win 点「仍要运行」）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 上传本平台产物（安装包 + blockmap + 自动更新元数据）供 publish job 汇总
      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          # 至少要有安装包，全为空说明打包异常，直接失败
          if-no-files-found: error
          retention-days: 3

  # 阶段二：单个 job 汇总所有平台产物，一次性创建公开 Release（只有这一处建 Release，根除并行竞态）。
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # 等所有平台打包完成后再统一发布
    needs: build

    steps:
      # 下载全部平台 artifact 到 artifacts/ 下（每个 artifact 一个子目录）
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 把各平台产物平铺到一个目录，便于一次性上传
      - name: Flatten artifacts
        run: |
          mkdir -p dist-release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.blockmap' -o -name 'latest*.yml' \) -exec cp {} dist-release/ \;
          ls -la dist-release

      # 一次性创建公开 Release 并上传所有平台安装包；gh release create 默认发布为公开（非草稿）。
      # 用 tag 名作为 Release 名，--generate-notes 自动根据提交/PR 生成发布说明。
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist-release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
