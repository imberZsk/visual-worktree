name: Release

# 仅在推送 v* 标签时触发正式发布（如 v1.2.3）。
# WHY 用 tag 而非普通 push：日常提交只跑 ci.yml 做测试与打包验证，不发布；
# 只有主动打 tag 才代表「就发这个版本」，避免每次 push 都误发一个 Release。
on:
  push:
    tags:
      - 'v*'

# 给内置 GITHUB_TOKEN 写权限：默认 token 只读，创建 Release / 上传附件需要 contents: write，否则 403。
permissions:
  contents: write

jobs:
  # 阶段一：各平台只原生打包，产物上传为 artifact，不创建 Release。
  # WHY 只打包不发布：若让两个平台 job 各自调 electron-builder --publish，二者并行时会同时检测到
  # 「Release 尚不存在」而各自创建，产生两个重复的 Release/草稿（已实测踩坑）。故发布统一交给下方单个 publish job。
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # 某一平台失败不取消另一平台，便于单独重跑
      fail-fast: false
      matrix:
        include:
          # Windows：nsis 安装包 + portable 便携版，x64
          - os: windows-latest
            build_args: --win --x64
          # macOS：DMG，arm64
          - os: macos-latest
            build_args: --mac --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # 让安装包版本跟触发发布的 tag 保持一致，而不依赖仓库里的 package.json 是否提前 bump。
      # WHY 自动打 tag 后，源码中的 package.json 可能仍停留在上一个发布版本；这里在 CI 工作区临时同步，
      # 既能保证安装包文件名/应用版本号正确，也避免为了发版额外创建版本号 PR。
      - name: Sync package version from tag
        shell: bash
        run: |
          node <<'NODE'
          // fs 模块用于读取和写回 package.json。
          const fs = require('node:fs');
          // packageFile 存储待同步版本号的 package.json 文件路径。
          const packageFile = 'package.json';
          // tagName 存储触发 Release workflow 的 Git tag 名称。
          const tagName = process.env.GITHUB_REF_NAME || '';
          // version 存储从 tag 中解析出的应用版本号。
          const version = tagName.replace(/^v/, '');
          // semverPattern 存储允许用于打包的版本号格式。
          const semverPattern = /^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/;
          if (!semverPattern.test(version)) {
            throw new Error(`无法从 tag ${tagName} 解析出合法版本号`);
          }
          // packageJson 存储 package.json 解析后的配置对象。
          const packageJson = JSON.parse(fs.readFileSync(packageFile, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageFile, `${JSON.stringify(packageJson, null, 2)}\n`);
          console.log(`package.json version synced to ${version}`);
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI
        run: pnpm run build:ui

      # 只打包不发布（--publish never）：产物落到 release/ 目录，由 publish job 统一发布。
      # package.json 保留 build.publish 配置，使 electron-builder 仍生成 latest*.yml 自动更新元数据。
      - name: Package
        run: npx electron-builder ${{ matrix.build_args }} --publish never
        env:
          # 无签名证书时关闭自动发现，避免联网拖慢；产物未签名（mac 需右键打开 / win 点「仍要运行」）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 上传本平台面向用户下载的安装包，供 publish job 汇总到 GitHub Release Assets。
      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
          # 至少要有安装包，全为空说明打包异常，直接失败
          if-no-files-found: error
          retention-days: 3

  # 阶段二：单个 job 汇总所有平台产物，一次性创建公开 Release（只有这一处建 Release，根除并行竞态）。
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # 等所有平台打包完成后再统一发布
    needs: build

    steps:
      # 下载全部平台 artifact 到 artifacts/ 下（每个 artifact 一个子目录）
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 把各平台产物平铺到一个目录，便于一次性上传
      - name: Flatten artifacts
        run: |
          mkdir -p dist-release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -exec cp {} dist-release/ \;
          ls -la dist-release

      # 根据本次实际产出的安装包动态生成「下载与安装」说明，写入 release-notes.md。
      # WHY 动态生成而非写死：产物文件名含版本号、且不同版本可能平台组合不同（如未来新增 win arm64），
      # 写死平台/文件名会随版本失真（历史 v1.1.2 就写死了「仅 macOS arm64」）。这里扫描 dist-release
      # 实际文件，按平台存在与否拼出对应下载项与首次打开提示，保证说明永远与该版本真实产物一致。
      - name: Generate install notes
        run: |
          # notes 累积「下载与安装」段落，最终写入文件供 gh release 引用
          notes="## 下载与安装"$'\n'
          # macOS DMG：取实际文件名（含版本号/架构），附未签名首次打开提示
          # shellcheck disable=SC2012
          dmg=$(ls dist-release/*.dmg 2>/dev/null | xargs -n1 basename 2>/dev/null | head -n1 || true)
          if [ -n "$dmg" ]; then
            notes+=$'\n'"### macOS"$'\n'
            notes+="- \`${dmg}\`"$'\n'
            notes+="- 安装包未签名，首次打开会被 Gatekeeper 拦截：请「右键 → 打开」，或执行 \`xattr -cr \"/Applications/Visual Worktree.app\"\`。"$'\n'
          fi
          # Windows 安装版 + 便携版：分别列出实际文件名
          setup=$(ls dist-release/*Setup*.exe 2>/dev/null | xargs -n1 basename 2>/dev/null | head -n1 || true)
          portable=$(ls dist-release/*portable*.exe 2>/dev/null | xargs -n1 basename 2>/dev/null | head -n1 || true)
          if [ -n "$setup" ] || [ -n "$portable" ]; then
            notes+=$'\n'"### Windows"$'\n'
            [ -n "$setup" ] && notes+="- \`${setup}\`（安装版）"$'\n'
            [ -n "$portable" ] && notes+="- \`${portable}\`（便携版，免安装）"$'\n'
            notes+="- 安装包未签名，首次运行可能触发 SmartScreen：请点「更多信息 → 仍要运行」。"$'\n'
          fi
          notes+=$'\n'"---"$'\n'
          # 写入文件供下一步 --notes-file 使用
          printf '%s' "$notes" > release-notes.md
          echo "===== 生成的安装说明 ====="
          cat release-notes.md

      # 一次性创建公开 Release 并上传所有平台安装包；gh release create 默认发布为公开（非草稿）。
      # 用 tag 名作为 Release 名；--notes-file 提供动态安装说明作为前缀，
      # --generate-notes 在其后追加根据提交/PR 自动生成的变更记录。
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release_assets 存储最终展示在 GitHub Release Assets 中、面向用户下载的文件。
          release_assets=()
          while IFS= read -r file; do
            release_assets+=("$file")
          done < <(find dist-release -type f \( -name '*.dmg' -o -name '*.exe' \) | sort)
          if [ "${#release_assets[@]}" -eq 0 ]; then
            echo "没有找到可发布的安装包"
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" "${release_assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --generate-notes
