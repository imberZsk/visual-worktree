name: CI

on:
  pull_request:
  # 保留手动触发入口，便于按需重新验证并下载双平台安装包。
  workflow_dispatch:

# 同一 PR 推送新提交时取消旧运行，避免过期 commit 继续占用 macOS/Windows runner。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 每个平台只初始化一次环境：测试通过后立即原生打包，避免拆成四个 job 后重复 checkout、安装依赖和构建 UI。
  verify:
    name: Test and package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      # 某一平台失败不取消另一平台，便于一次看到完整的跨平台结果。
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            package_command: pnpm run dist
            artifact_name: macos-package
            artifact_path: release/*.dmg
            electron_cache_path: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder
          - label: Windows
            os: windows-latest
            package_command: pnpm run dist:win
            artifact_name: windows-package
            artifact_path: release/*.exe
            electron_cache_path: |
              ~\AppData\Local\electron\Cache
              ~\AppData\Local\electron-builder\Cache

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # setup-node 已缓存 pnpm store；这里额外缓存 Electron 与 electron-builder 下载的运行时/打包工具。
      - name: Cache Electron downloads
        uses: actions/cache@v6
        with:
          path: ${{ matrix.electron_cache_path }}
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      # dist/dist:win 内部只执行一次 build:ui，然后调用对应平台 electron-builder。
      - name: Build package
        run: ${{ matrix.package_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
