name: CI

on:
  pull_request:
  # 保留手动触发入口，便于按需重新验证并下载双平台安装包。
  workflow_dispatch:

# 同一 PR 推送新提交时取消旧运行，避免过期 commit 继续占用 macOS/Windows runner。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 每个平台只初始化一次环境：测试通过后立即原生打包，避免拆成四个 job 后重复 checkout、安装依赖和构建 UI。
  verify:
    name: Test and package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      # 某一平台失败不取消另一平台，便于一次看到完整的跨平台结果。
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            package_script: dist
            artifact_name: macos-package
            artifact_path: release/*.dmg
            electron_cache_path: |
              ~/Library/Caches/electron
              ~/Library/Caches/electron-builder
          - label: Windows
            os: windows-latest
            package_script: dist:win
            artifact_name: windows-package
            artifact_path: release/*.exe
            electron_cache_path: |
              ~\AppData\Local\electron\Cache
              ~\AppData\Local\electron-builder\Cache

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # setup-node 已缓存 pnpm store；这里额外缓存 Electron 与 electron-builder 下载的运行时/打包工具。
      - name: Cache Electron downloads
        uses: actions/cache@v6
        with:
          path: ${{ matrix.electron_cache_path }}
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      # 在同一 runner 内重试可复用前一次已下载的 Electron/electron-builder 缓存，
      # 避免临时网络错误导致换 runner 后从零下载仍反复失败。
      - name: Build package
        shell: bash
        run: |
          # max_attempts 存储单次 CI job 允许的最大打包次数。
          max_attempts=3
          # retry_delay_seconds 存储首次重试前的等待秒数，后续按次数递增。
          retry_delay_seconds=15
          # retry_delay_increment_seconds 存储每次失败后增加的等待秒数。
          retry_delay_increment_seconds=15
          # attempt 存储当前打包尝试次数。
          attempt=1
          until pnpm run "${{ matrix.package_script }}"; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "打包连续失败 ${max_attempts} 次，停止重试" >&2
              exit 1
            fi
            echo "第 ${attempt} 次打包失败，等待 ${retry_delay_seconds} 秒后在同一 runner 重试"
            sleep "$retry_delay_seconds"
            attempt=$((attempt + 1))
            retry_delay_seconds=$((retry_delay_seconds + retry_delay_increment_seconds))
          done
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
